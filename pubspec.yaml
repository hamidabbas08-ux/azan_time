name: azan_time
description: A beautiful Islamic prayer time application.
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  adhan: ^2.0.0+1
  geolocator: ^14.0.3
  geocoding: ^5.0.0
  permission_handler: ^12.0.3
  flutter_local_notifications: ^22.0.1
  android_alarm_manager_plus: ^5.1.0
  audioplayers: ^6.8.1
  timezone: ^0.11.1
  flutter_native_timezone: ^2.0.0
  intl: ^0.20.3
  http: ^1.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  assets:
    - assets/audio/
    - assets/images/

flutter_launcher_icons:
  android: true
  image_path: assets/images/app_icon.png
  adaptive_icon_foreground: assets/images/app_icon.png
  adaptive_icon_background: "#0B5D3B"
